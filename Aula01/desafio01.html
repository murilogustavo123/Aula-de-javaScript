<body>
    <h1>Solicitando informações</h1>
    <hr>
    <script>
        let numero = window.prompt("Digite o primeiro numero");
        let numero2 = window.prompt("Digite o segundo numero");
        let pergunta = window.prompt("Você deseja adição ou subtração?");
        let resultado = 0;
        if (pergunta === "adição") {
            resultado = parseInt(numero) + parseInt(numero2);
        }
        if (pergunta === "subtração") {
            resultado = parseInt(numero) - parseInt(numero2);
        }
        window.alert("O resultado é: " + resultado);
    </script>
</body>
