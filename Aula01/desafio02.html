<body>
    <h1>Solicitando informações</h1>
    <hr>
    <h2></h2>
    <script>
        let numero = window.prompt("Digite o primeiro numero");
        let numero2 = window.prompt("Digite o segundo numero");
        let pergunta = window.prompt("Você deseja + ou -?");
        let resultado = 0;
        if (pergunta === "+") {
            resultado = parseInt(numero) + parseInt(numero2);
        }
        if (pergunta === "-") {
            resultado = parseInt(numero) - parseInt(numero2);
        }
        
       document.getElementsByTagName("h2")[0].innerText="O resultado é: "+resultado
    </script>
</body>
