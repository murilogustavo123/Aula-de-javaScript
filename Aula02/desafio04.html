<body>
    <h1><mark> Manipulação de elementos (tags)</mark> do html através do js </h1>
    <hr>

    <div>
        <img src="porsche.jpg" alt="um carro" width="250px" title="porsche"> <br>
        <button onclick="Trocar_img()">Trocar imagem</button>
    </div>


    <script>
        function Trocar_img (){
            const tags_i = document.getElementsByTagName('img'); 

            console.log(tags_i)
            let tags_i_1 = tags_i[0]
            if(tags_i_1.title=="carro"){
                tags_i_1.src="civic.jpg"
                tags_i_1.title = "civic"
            
            }else{
                   
                tags_i_1.src="porsche.jpg"
                tags_i_1.title = "carro"     
            }
        }
        
        


    </script>
    
</body>
