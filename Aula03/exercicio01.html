<body>
    <h1> Exercicios 01 De JS da Aula 03 </h1>
    <hr>
    <input type="button" onclick="triste();" value="Feliz">
    <input type="button" onclick="feliz();" value="Triste">
    <img src="imgtriste.jpg" id="rosto" style="width: 350px;">
    <script>
        function triste(){
            var tag_img = document.getElementsByTagName('img')[0]
            console.log(tag_img)
            tag_img.src = "imgfeliz.jpg";
        }

        function feliz(){
            var tag_img = document.getElementsByTagName('img')[0]
            console.log(tag_img)
            tag_img.src = "imgtriste.jpg";
        }
    </script>
