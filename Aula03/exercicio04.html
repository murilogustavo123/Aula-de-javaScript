<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 03 - Exercício 03</title>
</head>

<body>
    <h1> Exercicios 03 De JS da Aula 03 </h1>
    <hr>
    <form action="#">
        <input type="number" name="num1" id="num1" placeholder="digite o 1° numero" required>
        <input type="number" name="num2" id="num2" placeholder="digite o 2° numero" required>
        <br>
        <hr>
        <input type="button" value="+" onclick="somar();">
        <input type="button" value="-" onclick="subtrair();">
        <input type="button" value="*" onclick="multiplicar();">
        <input type="button" value="/" onclick="dividir();">

    </form>
    <div>
        <p><span id="resultado"></span></p>
    </div>
    <script>
        function somar() {
            let num1 = document.getElementById('num1')
            let num2 = document.getElementById('num2')
            let resultado = Number(num1.value) + Number(num2.value);
            document.getElementById('resultado').innerHTML = "O resultado da soma é: " + resultado;

        }

        function subtrair() {
            let num1 = document.getElementById('num1')
            let num2 = document.getElementById('num2')
            let resultado = Number(num1.value) + Number(num2.value);
            document.getElementById('resultado').innerHTML = "O resultado da soma é: " + resultado;



            }
        function multiplicar() {
            let num1 = document.getElementById('num1')
            let num2 = document.getElementById('num2')
            let resultado = Number(num1.value) * Number(num2.value);
            document.getElementById('resultado').innerHTML = "O resultado da multiplicação é: " + resultado;
        }

        function dividir() {
            let num1 = document.getElementById('num1')
            let num2 = document.getElementById('num2')
            let resultado = Number(num1.value) / Number(num2.value);
            document.getElementById('resultado').innerHTML = "O resultado da divisão é: " + resultado;
        }

    </script>

</body>

</html>
